<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyGameList | Fórum</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* =========================
   TEMA ESCURO (DEFAULT)
========================= */
:root{
--bg:#0b1020;
--card:#111827;
--card2:#0f172a;
--text:#e5e7eb;
--muted:#94a3b8;

--blue:#38bdf8;
--purple:#8b5cf6;
--green:#22c55e;
--red:#ef4444;
--yellow:#facc15;
--pink:#ec4899;
}

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* FUNDO ESCURO */
body{
background:linear-gradient(135deg,#050816,#0b1020);
color:var(--text);
min-height:100vh;
transition:.3s;
}

/* =========================
   🌞 TEMA CLARO (MELHORADO)
========================= */
body.light{

--card:#ffffff;
--card2:#f8fafc;
--text:#0f172a;
--muted:#475569;

background:
radial-gradient(circle at top,#93c5fd,transparent),
radial-gradient(circle at bottom,#f472b6,transparent),
linear-gradient(135deg,#e0f2fe,#f8fafc);

color:#0f172a;
}

/* HEADER */
header{
padding:18px 26px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.4);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.08);
position:sticky;
top:0;
}

body.light header{
background:linear-gradient(90deg,#ffffffcc,#e0f2fecc);
}

/* LOGO */
header h1{
display:flex;
gap:10px;
align-items:center;
color:var(--blue);
}

/* BOTÕES */
button{
padding:10px 14px;
border:0;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:#fff;
background:linear-gradient(135deg,var(--blue),var(--purple));
transition:.25s;
}

button:hover{
transform:translateY(-3px);
filter:brightness(1.2);
}

/* =========================
   ÍCONES INTERATIVOS (NOVO)
========================= */
i{
transition:.25s;
}

button:hover i{
color:#facc15;
transform:rotate(10deg) scale(1.2);
}

.topic:hover i{
color:#38bdf8;
transform:scale(1.2);
}

/* =========================
   CONTAINER
========================= */
.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
gap:20px;
}

/* POST */
.post-box{
background:var(--card);
padding:16px;
border-radius:16px;
border:1px solid rgba(255,255,255,.05);
}

body.light .post-box{
border:1px solid #cbd5e1;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.post-box textarea{
width:100%;
height:90px;
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
outline:none;
background:var(--card2);
color:var(--text);
}

/* =========================
   TÓPICOS
========================= */
.topic{
background:var(--card);
padding:16px;
border-radius:16px;
transition:.25s;
border-left:4px solid transparent;
}

body.light .topic{
box-shadow:0 10px 25px rgba(0,0,0,.08);
border:1px solid #e2e8f0;
}

/* HOVER */
.topic:hover{
transform:translateY(-3px);
border-left:4px solid var(--blue);
}

/* TEXTO */
.topic p{
color:var(--muted);
margin:8px 0;
}

/* BADGE */
.badge{
padding:4px 10px;
border-radius:999px;
font-size:12px;
font-weight:bold;
background:rgba(56,189,248,.15);
color:var(--blue);
}

/* =========================
   MODO CLARO MAIS COLORIDO
========================= */
body.light .badge{
background:linear-gradient(135deg,#60a5fa,#a78bfa);
color:#fff;
}

body.light .topic:nth-child(odd){
border-left:4px solid #60a5fa;
}

body.light .topic:nth-child(even){
border-left:4px solid #f472b6;
}

/* =========================
   AÇÕES
========================= */
.actions{
display:flex;
gap:12px;
font-size:13px;
color:var(--muted);
margin-top:10px;
}

.actions span{
cursor:pointer;
transition:.2s;
display:flex;
gap:6px;
align-items:center;
}

.actions span:hover{
color:var(--blue);
transform:scale(1.08);
}

/* =========================
   HEADER LADO DIREITO
========================= */
.top{
display:flex;
gap:10px;
align-items:center;
}

</style>
</head>

<body>

<header>

<h1><i class="fa-solid fa-gamepad"></i> MyGameList Fórum</h1>

<div class="top">

<button onclick="toggleTheme()" id="themeBtn">
<i class="fa-solid fa-moon"></i> Tema
</button>

<button><i class="fa-solid fa-plus"></i> Novo</button>

</div>

</header>

<div class="container">

<div class="post-box">
<b><i class="fa-solid fa-pen"></i> Criar tópico</b>
<textarea placeholder="Fale sobre jogos, builds, dicas..."></textarea>
<button style="margin-top:10px;">
<i class="fa-solid fa-paper-plane"></i> Publicar
</button>
</div>

<div class="topic">
<b><i class="fa-solid fa-fire"></i> Melhor jogo de 2026?</b>
<span class="badge">HOT</span>

<p>Discussão sobre os maiores jogos do ano.</p>

<div class="actions">
<span><i class="fa-solid fa-heart"></i> Curtir</span>
<span><i class="fa-solid fa-comment"></i> Comentar</span>
<span><i class="fa-solid fa-share"></i> Compartilhar</span>
</div>
</div>

<div class="topic">
<b><i class="fa-solid fa-book"></i> Guia RPG iniciante</b>
<span class="badge">GUIDE</span>

<p>Dicas essenciais para evoluir rápido em RPGs.</p>

<div class="actions">
<span><i class="fa-solid fa-thumbs-up"></i> Curtir</span>
<span><i class="fa-solid fa-comment"></i> Comentar</span>
</div>
</div>

</div>

<script>

/* TEMA */
function toggleTheme(){

document.body.classList.toggle("light");

let btn = document.getElementById("themeBtn");

if(document.body.classList.contains("light")){
btn.innerHTML = '<i class="fa-solid fa-sun"></i> Claro';
localStorage.setItem("theme","light");
}else{
btn.innerHTML = '<i class="fa-solid fa-moon"></i> Escuro';
localStorage.setItem("theme","dark");
}

}

/* manter tema */
window.onload = () => {
let theme = localStorage.getItem("theme");

if(theme === "light"){
document.body.classList.add("light");
document.getElementById("themeBtn").innerHTML =
'<i class="fa-solid fa-sun"></i> Claro';
}
};

</script>

</body>
</html>
