<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login | MyGameList</title>
	<style>
		:root {
			--bg-1: #1f2937;
			--bg-2: #111827;
			--card: #ffffff;
			--text: #111827;
			--muted: #6b7280;
			--primary: #0ea5e9;
			--primary-hover: #0284c7;
			--danger: #dc2626;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: radial-gradient(circle at top, var(--bg-1), var(--bg-2));
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			padding: 24px;
		}

		.card {
			width: 100%;
			max-width: 420px;
			background: var(--card);
			border-radius: 16px;
			box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
			padding: 28px;
			animation: rise 420ms ease-out;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 1.5rem;
		}

		p {
			margin: 0 0 24px;
			color: var(--muted);
		}

		.field {
			margin-bottom: 14px;
		}

		label {
			display: block;
			margin-bottom: 8px;
			font-weight: 600;
			font-size: 0.95rem;
		}

		input {
			width: 100%;
			border: 1px solid #d1d5db;
			border-radius: 10px;
			padding: 11px 12px;
			font-size: 1rem;
		}

		input:focus {
			outline: 2px solid #bae6fd;
			border-color: var(--primary);
		}

		button {
			width: 100%;
			border: 0;
			border-radius: 10px;
			padding: 12px;
			background: var(--primary);
			color: white;
			font-size: 1rem;
			font-weight: 700;
			cursor: pointer;
			transition: background 160ms ease-in-out;
		}

		button:hover {
			background: var(--primary-hover);
		}

		button:disabled {
			opacity: 0.75;
			cursor: wait;
		}

		.message {
			margin-top: 12px;
			min-height: 20px;
			font-size: 0.95rem;
			color: var(--danger);
		}

		.hint {
			margin-top: 14px;
			font-size: 0.9rem;
			color: var(--muted);
		}

		@keyframes rise {
			from {
				transform: translateY(12px);
				opacity: 0;
			}
			to {
				transform: translateY(0);
				opacity: 1;
			}
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Entrar no MyGameList</h1>
		<p>Login com JWT no backend FastAPI.</p>

		<form id="login-form">
			<div class="field">
				<label for="username">Usuario</label>
				<input id="username" name="username" type="text" autocomplete="username" required />
			</div>

			<div class="field">
				<label for="password">Senha</label>
				<input id="password" name="password" type="password" autocomplete="current-password" required />
			</div>

			<button id="submit-btn" type="submit">Entrar</button>
			<div id="message" class="message"></div>
		</form>
	</main>

	<script>
		const form = document.getElementById("login-form");
		const message = document.getElementById("message");
		const button = document.getElementById("submit-btn");

		form.addEventListener("submit", async (event) => {
			event.preventDefault();
			message.textContent = "";
			button.disabled = true;

			const username = document.getElementById("username").value.trim();
			const password = document.getElementById("password").value;

			const payload = new URLSearchParams();
			payload.append("username", username);
			payload.append("password", password);

			try {
				const response = await fetch("/token", {
					method: "POST",
					headers: {
						"Content-Type": "application/x-www-form-urlencoded"
					},
					body: payload
				});

				if (!response.ok) {
					let detail = "Falha no login";
					try {
						const data = await response.json();
						detail = data.detail || detail;
					} catch (error) {
						detail = "Falha no login";
					}
					throw new Error(detail);
				}

				const tokenData = await response.json();
				localStorage.setItem("access_token", tokenData.access_token);
				localStorage.setItem("token_type", tokenData.token_type || "bearer");

				window.location.href = "/dashboard";
			} catch (error) {
				message.textContent = error.message || "Erro inesperado no login";
			} finally {
				button.disabled = false;
			}
		});
	</script>
</body>
</html>
