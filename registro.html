<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Crie sua conta no MyGameList e comece a montar sua coleção gamer.">
<title>Cadastro | MyGameList</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root{
  --bg-deep:#050816; --bg-mid:#0b1120;
  --card:#0f172a; --card-b:#1e293b;
  --text:#e2e8f0; --muted:#94a3b8; --border:rgba(255,255,255,.08);
  --blue:#38bdf8; --purple:#818cf8; --green:#34d399; --danger:#f87171;
  --grad:linear-gradient(135deg,#38bdf8,#818cf8);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:grid;place-items:center;
  background:
    radial-gradient(circle at 20% 20%,rgba(56,189,248,.12) 0%,transparent 35%),
    radial-gradient(circle at 80% 80%,rgba(129,140,248,.12) 0%,transparent 35%),
    linear-gradient(135deg,var(--bg-deep),var(--bg-mid));
  color:var(--text);padding:24px;
}

/* Particles */
.particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.particle{position:absolute;border-radius:50%;animation:float linear infinite;opacity:.15;}
@keyframes float{
  from{transform:translateY(110vh) rotate(0deg);opacity:0;}
  10%{opacity:.15;} 90%{opacity:.15;}
  to{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}

.card{
  position:relative;z-index:1;
  width:100%;max-width:500px;
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:40px 36px;
  box-shadow:0 32px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
  animation:rise 480ms cubic-bezier(.16,1,.3,1);
}
@keyframes rise{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.logo{text-align:center;margin-bottom:28px;}
.logo-icon{
  width:56px;height:56px;background:var(--grad);
  border-radius:16px;display:inline-flex;align-items:center;justify-content:center;
  font-size:26px;margin-bottom:14px;box-shadow:0 10px 30px rgba(56,189,248,.3);
}
.logo h1{
  font-size:1.5rem;font-weight:800;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:5px;
}
.logo p{color:var(--muted);font-size:.88rem;}

/* Fields */
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{margin-bottom:16px;}
label{
  display:block;margin-bottom:7px;
  font-size:.8rem;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em;
}
.input-wrap{position:relative;}
.input-wrap i{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:.85rem;pointer-events:none;transition:color .2s;
}
input,textarea{
  width:100%;background:var(--card-b);border:1px solid var(--border);
  border-radius:12px;padding:12px 13px 12px 38px;
  font-size:.93rem;color:var(--text);font-family:'Inter',sans-serif;
  transition:border-color .2s,box-shadow .2s;
}
textarea{resize:none;height:80px;padding-left:13px;}
input:focus,textarea:focus{
  outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(56,189,248,.1);
}
.input-wrap:focus-within i{color:var(--blue);}
input::placeholder,textarea::placeholder{color:var(--muted);}

/* Checkbox */
.check{display:flex;gap:8px;align-items:flex-start;font-size:.85rem;color:var(--muted);margin:16px 0;}
.check input{width:auto;padding:0;border-radius:4px;}

/* Buttons */
.btn{
  width:100%;border:none;border-radius:12px;padding:14px;
  font-size:.97rem;font-weight:700;font-family:'Inter',sans-serif;
  cursor:pointer;transition:transform .18s,filter .18s,background .18s;
}
.btn:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.08);}
.btn:disabled{opacity:.6;cursor:wait;}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 10px 28px rgba(56,189,248,.22);}
.btn-ghost{
  background:transparent;border:1.5px solid var(--border);
  color:var(--muted);margin-top:10px;
}
.btn-ghost:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:rgba(56,189,248,.06);}

.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:.8rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.msg{
  margin-top:14px;padding:10px 14px;border-radius:10px;
  font-size:.88rem;font-weight:600;text-align:center;display:none;
}
.msg.error  {display:block;color:var(--danger);background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);}
.msg.success{display:block;color:var(--green);background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);}

.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:520px){.row{grid-template-columns:1fr;}.card{padding:30px 20px;}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>

<main class="card">
  <div class="logo">
    <div class="logo-icon">🎮</div>
    <h1>Criar Conta</h1>
    <p>Monte sua coleção gamer e junte-se à comunidade</p>
  </div>

  <form id="registerForm" autocomplete="on">

    <div class="row">
      <div class="field">
        <label for="fullName">Nome</label>
        <div class="input-wrap">
          <input id="fullName" type="text" placeholder="Seu nome" autocomplete="name" required />
          <i class="fa-solid fa-user"></i>
        </div>
      </div>
      <div class="field">
        <label for="username">Usuário</label>
        <div class="input-wrap">
          <input id="username" type="text" placeholder="nome_de_usuario" autocomplete="username" required />
          <i class="fa-solid fa-at"></i>
        </div>
      </div>
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <input id="email" type="email" placeholder="voce@email.com" autocomplete="email" required />
        <i class="fa-solid fa-envelope"></i>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="password">Senha</label>
        <div class="input-wrap">
          <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" required />
          <i class="fa-solid fa-lock"></i>
        </div>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirmar</label>
        <div class="input-wrap">
          <input id="confirmPassword" type="password" placeholder="••••••••" autocomplete="new-password" required />
          <i class="fa-solid fa-lock"></i>
        </div>
      </div>
    </div>

    <div class="field">
      <label for="dateOfBirth">Data de Nascimento</label>
      <div class="input-wrap">
        <input id="dateOfBirth" type="date" style="padding-left:13px;" />
        <i class="fa-solid fa-calendar" style="left:auto;right:13px;"></i>
      </div>
    </div>

    <div class="field">
      <label for="profileBio">Bio do Perfil</label>
      <textarea id="profileBio" placeholder="Fale sobre você e seus jogos favoritos..."></textarea>
    </div>

    <div class="check">
      <input type="checkbox" id="terms" required />
      <span>Concordo com os termos de uso e política de privacidade.</span>
    </div>

    <button type="submit" id="submit-btn" class="btn btn-primary">
      <i class="fa-solid fa-user-plus"></i> Criar Conta
    </button>

    <div id="msg" class="msg"></div>

    <div class="divider">ou</div>

    <button type="button" class="btn btn-ghost" onclick="window.location.href='/login'">
      <i class="fa-solid fa-right-to-bracket"></i> Já tenho conta — Entrar
    </button>

    <button type="button" class="btn btn-ghost" onclick="window.location.href='/'" style="margin-top: 10px;">
      <i class="fa-solid fa-house"></i> Voltar ao Início
    </button>
  </form>
</main>

<script>
// Particles
(function(){
  const c=document.getElementById('particles');
  const colors=['#38bdf8','#818cf8','#34d399','#f472b6'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const s=Math.random()*6+2;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s;`;
    c.appendChild(p);
  }
})();

const form = document.getElementById('registerForm');
const msgEl = document.getElementById('msg');
const btn   = document.getElementById('submit-btn');

function showMsg(text, type) {
  msgEl.textContent = text;
  msgEl.className = 'msg ' + type;
}

form.addEventListener('submit', async function(e) {
  e.preventDefault();

  const password        = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    showMsg('As senhas não coincidem!', 'error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Criando conta...';
  showMsg('', '');

  const payload = {
    full_name:    document.getElementById('fullName').value,
    username:     document.getElementById('username').value,
    email:        document.getElementById('email').value,
    password:     password,
    date_of_birth: document.getElementById('dateOfBirth').value || null,
    profile_bio:  document.getElementById('profileBio').value || null,
  };

  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (!res.ok) {
      showMsg(data.detail || 'Não foi possível criar a conta.', 'error');
      return;
    }

    showMsg('✅ Conta criada com sucesso! Redirecionando...', 'success');
    setTimeout(() => { window.location.href = '/login'; }, 1200);
  } catch (_e) {
    showMsg('Erro de conexão com o servidor.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Criar Conta';
  }
});
</script>
</body>
</html>
