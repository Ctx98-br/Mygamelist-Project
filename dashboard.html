<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | MyGameList</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(170deg, #0f172a, #1e293b);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: 100%;
            max-width: 720px;
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(3px);
        }

        h1 {
            margin-top: 0;
        }

        .ok {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .muted {
            color: var(--muted);
        }

        pre {
            background: rgba(2, 6, 23, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 14px;
            overflow: auto;
        }

        .actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
        }

        #refresh {
            background: #0ea5e9;
            color: #fff;
        }

        #logout {
            background: var(--danger);
            color: #fff;
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1>Bem-vindo ao MyGameList, <span id="user-name" style="color: var(--accent);">...</span></h1>
        
        <div id="status" class="ok">Conectado com sucesso ✅</div>
        <p class="muted">Dados do usuário autenticado via JWT:</p>
        
        <pre id="user-data">Carregando dados do servidor...</pre>

        <div class="actions">
            <button id="refresh" type="button">Atualizar Perfil</button>
            <button id="logout-btn" type="button" style="background: var(--danger); color: white;">Sair</button>
        </div>
    </main>

    <script>
    async function checkAuth() {
        const token = localStorage.getItem("access_token");

        if (!token) {
            window.location.href = "/";
            return;
        }

        try {
            const response = await fetch("/users/me/", {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            if (!response.ok) {
                throw new Error("Token inválido");
            }

            const userData = await response.json();
            
            // Atualiza o nome no título
            document.getElementById("user-name").textContent = userData.full_name || userData.username;
            
            // Mostra o JSON formatado no painel escuro (o '2' é para indentar)
            document.getElementById("user-data").textContent = JSON.stringify(userData, null, 2);
            
        } catch (error) {
            console.error(error);
            localStorage.removeItem("access_token");
            window.location.href = "/";
        }
    }

    // Função de Logout
    function handleLogout() {
        localStorage.removeItem("access_token");
        localStorage.removeItem("token_type");
        window.location.href = "/";
    }

    // Event Listeners (Conectando os botões)
    document.getElementById("logout-btn").addEventListener("click", handleLogout);
    document.getElementById("refresh").addEventListener("click", checkAuth);

    // Executa ao carregar a página
    checkAuth();
    </script>
</body>
</html>
