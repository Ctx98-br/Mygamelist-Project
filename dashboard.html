<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | MyGameList</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(170deg, #0f172a, #1e293b);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: 100%;
            max-width: 720px;
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(3px);
        }

        h1 {
            margin-top: 0;
        }

        .ok {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .muted {
            color: var(--muted);
        }

        pre {
            background: rgba(2, 6, 23, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 14px;
            overflow: auto;
        }

        .actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
        }

        #refresh {
            background: #0ea5e9;
            color: #fff;
        }

        #logout {
            background: var(--danger);
            color: #fff;
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1>Bem vindo ao MyGameList</h1>
        <div id="status" class="ok">Verificando token...</div>
        <p class="muted">Dados do usuario autenticado via JWT:</p>
        <pre id="user-data">Carregando...</pre>

        <div class="actions">
            <button id="refresh" type="button">Atualizar perfil</button>
            <button id="logout" type="button">Sair</button>
        </div>
    </main>

    <script>
        const statusEl = document.getElementById("status");
        const userDataEl = document.getElementById("user-data");

        function getToken() {
            return localStorage.getItem("access_token");
        }

        function redirectToLogin() {
            window.location.href = "/";
        }

        async function loadProfile() {
            const token = getToken();

            if (!token) {
                statusEl.textContent = "Token nao encontrado. Redirecionando para login...";
                setTimeout(redirectToLogin, 700);
                return;
            }

            try {
                const response = await fetch("/users/me/", {
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error("Token invalido ou expirado");
                }

                const data = await response.json();
                statusEl.textContent = "Autenticado com sucesso";
                userDataEl.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                statusEl.textContent = error.message;
                localStorage.removeItem("access_token");
                localStorage.removeItem("token_type");
                setTimeout(redirectToLogin, 900);
            }
        }

        document.getElementById("refresh").addEventListener("click", loadProfile);
        document.getElementById("logout").addEventListener("click", () => {
            localStorage.removeItem("access_token");
            localStorage.removeItem("token_type");
            redirectToLogin();
        });

        loadProfile();
    </script>
</body>
</html>
